<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特教中心叫號系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { background: white; max-width: 450px; margin: 20px auto; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #eef2f7; }
        .title { font-size: 1.8rem; margin-bottom: 30px; color: #2c3e50; font-weight: bold; }
        .label { color: #888; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
        .number-display { font-size: 7rem; font-weight: 900; color: #007bff; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,123,255,0.1); }
        .counter-info { font-size: 1.6rem; color: #2ecc71; margin-bottom: 30px; font-weight: bold; height: 1.6em; }
        button { width: 90%; padding: 22px; font-size: 1.5rem; border-radius: 20px; border: none; cursor: pointer; transition: all 0.2s; margin-top: 10px; font-weight: bold; }
        .btn-call { background: #28a745; color: white; box-shadow: 0 6px #1e7e34; }
        .btn-take { background: #007bff; color: white; box-shadow: 0 6px #0056b3; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #1e7e34; }
        #admin-section { margin-top: 30px; padding-top: 30px; border-top: 2px dashed #ddd; }
        input { padding: 10px; font-size: 1.2rem; width: 60px; text-align: center; border: 2px solid #ddd; border-radius: 10px; font-weight: bold; }
        .status { font-size: 0.8rem; color: #bbb; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="title" id="roleTitle">載入中...</div>
    <div class="label">目前叫號</div>
    <div id="currentNum" class="number-display">0</div>
    <div id="currentCounter" class="counter-info">請稍候</div>

    <div id="user-section" style="display:none;">
        <hr style="border:0; border-top:1px solid #eee; margin: 30px 0;">
        <div class="label">您的號碼</div>
        <div id="myTicket" class="number-display" style="font-size: 4rem; color: #95a5a6;">--</div>
        <button class="btn-take" onclick="takeTicket()">點我取號</button>
    </div>

    <div id="admin-section" style="display:none;">
        <div style="margin-bottom:20px;">我在 <input type="number" id="counterId" value="1"> 號櫃檯</div>
        <button class="btn-call" onclick="nextCall()">叫下一位</button>
        <button style="background:#6c757d; font-size:1rem; padding:10px; margin-top:20px; box-shadow:0 4px #495057; color:white;" onclick="resetQueue()">重置號碼 (慎用)</button>
    </div>
    <div class="status" id="dbStatus">連線狀態：偵測中...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf5PGYSqrK3pJwEaIHct1jQB4c1r8_0Yw",
        authDomain: "special-edu-call.firebaseapp.com",
        databaseURL: "https://special-edu-call-default-rtdb.firebaseio.com/",
        projectId: "special-edu-call",
        storageBucket: "special-edu-call.firebasestorage.app",
        messagingSenderId: "290449966999",
        appId: "1:290449966999:web:7ed6e61a1c2b0c9b9de6d2",
        measurementId: "G-FP84NLD3MP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const isAdmin = window.location.search.includes('admin');
    document.getElementById('roleTitle').innerText = isAdmin ? "特教中心-櫃檯叫號" : "特教中心-請掃描取號";
    document.getElementById(isAdmin ? 'admin-section' : 'user-section').style.display = 'block';

    // 1. 即時同步畫面：所有人都會看到號碼變動，但這裡絕對不播音
    db.ref('queue').on('value', (snapshot) => {
        const data = snapshot.val() || { current: 0, last: 0, counter: 1 };
        document.getElementById('currentNum').innerText = data.current;
        document.getElementById('currentCounter').innerText = data.current > 0 ? "請至 " + data.counter + " 號櫃檯" : "準備叫號";
        document.getElementById('dbStatus').innerText = "連線狀態：正常運作中";
    });

    // 2. 取號功能：只管取號，不管說話
    function takeTicket() {
        db.ref('queue/last').transaction((last) => {
            const next = (last || 0) + 1;
            document.getElementById('myTicket').innerText = next;
            return next;
        });
    }

    // 3. 叫號功能：只有點擊「叫下一位」的裝置會發出聲音
    function nextCall() {
        const cid = document.getElementById('counterId').value;
        db.ref('queue').transaction((data) => {
            if (!data) data = { current: 0, last: 0 };
            if (data.current < data.last) {
                data.current += 1;
                data.counter = cid;
                
                // 【關鍵修正】在交易成功完成後，主動發音
                speak(data.current, data.counter);
                
                return data;
            } else {
                alert("目前沒有人在排隊喔！");
                return;
            }
        });
    }

    function resetQueue() {
        if(confirm("確定要將所有號碼清零嗎？")) {
            db.ref('queue').set({ current: 0, last: 0, counter: 1 });
            document.getElementById('myTicket').innerText = "--";
        }
    }

    function speak(n, c) {
        // 二重保險：網址沒 admin 的絕對不出聲
        if (!isAdmin) return;

        window.speechSynthesis.cancel();
        const text = "請來賓 " + n + " 號，到 " + c + " 號櫃檯辦理";
        const msg = new SpeechSynthesisUtterance(text);
        
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => (v.lang === 'zh-TW' || v.lang === 'zh_TW')) || voices[0];
        
        if (voice) msg.voice = voice;
        msg.lang = 'zh-TW';
        msg.volume = 1;
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
