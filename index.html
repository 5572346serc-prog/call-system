<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特教叫號-V5隔離診斷版</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #e9ecef; margin: 0; padding: 20px; }
        .container { background: white; max-width: 450px; margin: 20px auto; padding: 40px 20px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .number-display { font-size: 7rem; font-weight: 900; color: #dc3545; margin: 10px 0; }
        button { width: 90%; padding: 20px; font-size: 1.5rem; border-radius: 15px; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; color: white; }
        .btn-call { background: #28a745; }
        .btn-take { background: #007bff; }
        .debug-info { font-size: 0.8rem; color: #777; margin-top: 20px; padding: 10px; background: #eee; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="roleTitle">診斷中...</h2>
    <div style="color:#666">目前叫號</div>
    <div id="currentNum" class="number-display">0</div>
    <div id="currentCounter" style="font-size:1.5rem; color:#28a745; font-weight:bold;">--</div>

    <div id="user-section" style="display:none;">
        <div id="myTicket" class="number-display" style="font-size: 4rem; color: #6c757d;">--</div>
        <button class="btn-take" onclick="takeTicket()">點我取號</button>
    </div>

    <div id="admin-section" style="display:none;">
        <div>我在 <input type="number" id="counterId" value="1" style="width:50px; font-size:1.2rem;"> 號櫃檯</div>
        <button class="btn-call" onclick="nextCall()">叫下一位</button>
        <button style="background:#6c757d; font-size:0.9rem;" onclick="resetQueue()">重置資料</button>
    </div>

    <div class="debug-info">
        路徑：queue_v5 | 模式：<span id="modeTag">讀取中</span><br>
        <small>※ 如果抽號還會叫，表示你有另一台隱藏的管理員網頁開著！</small>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf5PGYSqrK3pJwEaIHct1jQB4c1r8_0Yw",
        authDomain: "special-edu-call.firebaseapp.com",
        databaseURL: "https://special-edu-call-default-rtdb.firebaseio.com/",
        projectId: "special-edu-call",
        storageBucket: "special-edu-call.firebasestorage.app",
        messagingSenderId: "290449966999",
        appId: "1:290449966999:web:7ed6e61a1c2b0c9b9de6d2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const isAdmin = window.location.search.includes('admin');
    
    document.getElementById('roleTitle').innerText = isAdmin ? "管理員端 (V5)" : "取號端 (V5)";
    document.getElementById('modeTag').innerText = isAdmin ? "管理員 (會說話)" : "取號者 (不准說話)";
    document.getElementById(isAdmin ? 'admin-section' : 'user-section').style.display = 'block';

    // 1. 畫面同步 (絕對不准放 speak)
    db.ref('queue_v5').on('value', (snap) => {
        const data = snap.val() || { current: 0, last: 0, counter: 1 };
        document.getElementById('currentNum').innerText = data.current;
        document.getElementById('currentCounter').innerText = "請至 " + data.counter + " 號櫃檯";
    });

    // 2. 取號 (單純加 1)
    function takeTicket() {
        db.ref('queue_v5/last').transaction(v => (v || 0) + 1, (err, comm, snap) => {
            if (comm) document.getElementById('myTicket').innerText = snap.val();
        });
    }

    // 3. 叫號 (僅限點擊按鈕才播報)
    async function nextCall() {
        if (!isAdmin) return;
        const snap = await db.ref('queue_v5').once('value');
        const data = snap.val() || { current: 0, last: 0 };

        if (data.current < data.last) {
            const nextNum = data.current + 1;
            const cid = document.getElementById('counterId').value;
            await db.ref('queue_v5').update({ current: nextNum, counter: cid });
            
            // 只有「主動點擊」這台會播報
            speak(nextNum, cid);
        } else {
            alert("目前沒人在排隊！");
        }
    }

    function speak(n, c) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance("請來賓 " + n + " 號，到 " + c + " 號櫃檯辦理");
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    function resetQueue() {
        if(confirm("確定重置？")) db.ref('queue_v5').set({ current: 0, last: 0, counter: 1 });
    }
</script>
</body>
</html>
