<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特教中心叫號-V4手動穩定版</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { background: white; max-width: 450px; margin: 20px auto; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #eef2f7; }
        .title { font-size: 1.6rem; margin-bottom: 20px; color: #2c3e50; font-weight: bold; }
        .number-display { font-size: 7rem; font-weight: 900; color: #007bff; margin: 10px 0; }
        .counter-info { font-size: 1.6rem; color: #2ecc71; margin-bottom: 30px; font-weight: bold; }
        button { width: 90%; padding: 22px; font-size: 1.5rem; border-radius: 20px; border: none; cursor: pointer; transition: all 0.2s; margin-top: 10px; font-weight: bold; }
        .btn-call { background: #28a745; color: white; box-shadow: 0 6px #1e7e34; }
        .btn-take { background: #007bff; color: white; box-shadow: 0 6px #0056b3; }
        #admin-section { margin-top: 30px; padding-top: 30px; border-top: 2px dashed #ddd; }
        input { padding: 10px; font-size: 1.2rem; width: 60px; text-align: center; border: 2px solid #ddd; border-radius: 10px; }
        .ver-tag { font-size: 0.7rem; color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="title" id="roleTitle">載入中... <span class="ver-tag">V4</span></div>
    <div style="color:#888">目前叫號</div>
    <div id="currentNum" class="number-display">0</div>
    <div id="currentCounter" class="counter-info">--</div>

    <div id="user-section" style="display:none;">
        <div style="color:#888">您的號碼</div>
        <div id="myTicket" class="number-display" style="font-size: 4rem; color: #95a5a6;">--</div>
        <button class="btn-take" onclick="takeTicket()">點我取號</button>
    </div>

    <div id="admin-section" style="display:none;">
        <div style="margin-bottom:20px;">我在 <input type="number" id="counterId" value="1"> 號櫃檯</div>
        <button class="btn-call" onclick="nextCall()">叫下一位</button>
        <button style="background:#6c757d; font-size:1rem; padding:10px; margin-top:20px; color:white;" onclick="resetQueue()">重置號碼</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBf5PGYSqrK3pJwEaIHct1jQB4c1r8_0Yw",
        authDomain: "special-edu-call.firebaseapp.com",
        databaseURL: "https://special-edu-call-default-rtdb.firebaseio.com/",
        projectId: "special-edu-call",
        storageBucket: "special-edu-call.firebasestorage.app",
        messagingSenderId: "290449966999",
        appId: "1:290449966999:web:7ed6e61a1c2b0c9b9de6d2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const isAdmin = window.location.search.includes('admin');
    document.getElementById('roleTitle').innerHTML = isAdmin ? "管理員端 <span class='ver-tag'>V4-Manual</span>" : "取號端 <span class='ver-tag'>V4-Manual</span>";
    document.getElementById(isAdmin ? 'admin-section' : 'user-section').style.display = 'block';

    // --- 改用「主動抓取」而不是「被動監聽」 ---
    // 每 2 秒才去跟資料庫要一次數字，這樣「抽號」絕對不會主動推播語音過來
    function refreshData() {
        db.ref('queue').once('value').then((snap) => {
            const data = snap.val() || { current: 0, last: 0, counter: 1 };
            document.getElementById('currentNum').innerText = data.current;
            document.getElementById('currentCounter').innerText = "請至 " + data.counter + " 號櫃檯";
        });
    }
    setInterval(refreshData, 2000); 
    refreshData();

    // --- 取號 ---
    function takeTicket() {
        db.ref('queue/last').transaction(v => (v || 0) + 1, (err, comm, snap) => {
            if (comm) document.getElementById('myTicket').innerText = snap.val();
        });
    }

    // --- 叫號 (只有這裡會發出聲音) ---
    async function nextCall() {
        if (!isAdmin) return;
        
        // 1. 先抓最新資料
        const snap = await db.ref('queue').once('value');
        const data = snap.val() || { current: 0, last: 0 };

        if (data.current < data.last) {
            const nextNum = data.current + 1;
            const cid = document.getElementById('counterId').value;
            
            // 2. 更新資料庫
            await db.ref('queue').update({ current: nextNum, counter: cid });

            // 3. 更新成功後，「主動」叫號
            // 這裡絕對是手動觸發，跟資料庫監聽無關
            speak(nextNum, cid);
            refreshData(); 
        } else {
            alert("沒人在排隊！");
        }
    }

    function speak(n, c) {
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance("請來賓 " + n + " 號，到 " + c + " 號櫃檯辦理");
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function resetQueue() {
        if(confirm("重置？")) db.ref('queue').set({ current: 0, last: 0, counter: 1 });
    }
</script>
</body>
</html>
