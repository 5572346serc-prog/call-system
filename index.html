<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>特教叫號-V6.3終極穩定版</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #e9ecef; margin: 0; padding: 20px; color: #333; }
        .container { background: white; max-width: 450px; margin: 20px auto; padding: 40px 20px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 2px solid #eef2f7; }
        .title { font-size: 1.8rem; margin-bottom: 30px; color: #2c3e50; font-weight: bold; }
        .label { color: #888; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }
        .number-display { font-size: 7rem; font-weight: 900; color: #007bff; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,123,255,0.1); }
        .counter-info { font-size: 1.6rem; color: #2ecc71; margin-bottom: 30px; font-weight: bold; height: 1.6em; }
        button { width: 90%; padding: 22px; font-size: 1.5rem; border-radius: 20px; border: none; cursor: pointer; transition: all 0.2s; margin-top: 10px; font-weight: bold; }
        .btn-call { background: #28a745; color: white; box-shadow: 0 6px #1e7e34; }
        .btn-replay { background: #17a2b8; color: white; box-shadow: 0 6px #117a8b; }
        .btn-take { background: #007bff; color: white; box-shadow: 0 6px #0056b3; }
        button:active { transform: translateY(4px); box-shadow: 0 2px #1e7e34; }
        #admin-section { margin-top: 30px; padding-top: 30px; border-top: 2px dashed #ddd; }
        input { padding: 10px; font-size: 1.2rem; width: 60px; text-align: center; border: 2px solid #ddd; border-radius: 10px; font-weight: bold; }
        .status { font-size: 0.8rem; color: #bbb; margin-top: 30px; }
        /* 提示語樣式：拆成兩行後的間距優化 */
        .tip-text { color: #e74c3c; font-weight: bold; font-size: 1.1rem; margin-top: 8px; line-height: 1.4; }
        .debug-tag { color: #2980b9; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="title" id="roleTitle">載入中... <span class="debug-tag">V6.3</span></div>
    <div class="label">目前叫號</div>
    <div id="currentNum" class="number-display">0</div>
    <div id="currentCounter" class="counter-info">請稍候</div>

    <div id="user-section" style="display:none;">
        <hr style="border:0; border-top:1px solid #eee; margin: 30px 0;">
        <div class="label">您的號碼</div>
        <div id="myTicket" class="number-display" style="font-size: 4rem; color: #95a5a6;">--</div>
        
        <div class="tip-text">⚠️ 擊點一次即可</div>
        <div class="tip-text">📸 建議螢幕截圖您的號碼</div>
        
        <button class="btn-take" onclick="takeTicket()" style="margin-top: 25px;">點我取號</button>
    </div>

    <div id="admin-section" style="display:none;">
        <div style="margin-bottom:20px;">我在 <input type="number" id="counterId" value="1"> 號櫃檯</div>
        <button class="btn-call" onclick="nextCall()">叫下一位</button>
        <button class="btn-replay" onclick="replayCall()" style="margin-top: 15px;">🔊 重播目前叫號</button>
        <button style="background:#6c757d; font-size:1rem; padding:10px; margin-top:30px; color:white; box-shadow: 0 4px #495057;" onclick="resetQueue()">重置號碼 (慎用)</button>
    </div>
    <div class="status" id="dbStatus">路徑：queue_v5 | 系統就緒</div>
</div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyBf5PGYSqrK3pJwEaIHct1jQB4c1r8_0Yw",
        authDomain: "special-edu-call.firebaseapp.com",
        databaseURL: "https://special-edu-call-default-rtdb.firebaseio.com/",
        projectId: "special-edu-call",
        storageBucket: "special-edu-call.firebasestorage.app",
        messagingSenderId: "290449966999",
        appId: "1:290449966999:web:7ed6e61a1c2b0c9b9de6d2",
        measurementId: "G-FP84NLD3MP"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const isAdmin = window.location.search.includes('admin');
    document.getElementById('roleTitle').innerHTML = isAdmin ? "管理員端 <span class='debug-tag'>V6.3</span>" : "取號端 <span class='debug-tag'>V6.3</span>";
    document.getElementById(isAdmin ? 'admin-section' : 'user-section').style.display = 'block';

    // 全域變數，供重播按鈕使用
    let currentDisplayNum = 0;
    let currentDisplayCounter = 1;

    // 1. 同步資料 (不含語音，絕對不准自動播報)
    db.ref('queue_v5').on('value', (snapshot) => {
        const data = snapshot.val() || { current: 0, last: 0, counter: 1 };
        currentDisplayNum = data.current;
        currentDisplayCounter = data.counter;
        document.getElementById('currentNum').innerText = currentDisplayNum;
        document.getElementById('currentCounter').innerText = currentDisplayNum > 0 ? "請至 " + currentDisplayCounter + " 號櫃檯" : "準備叫號";
        document.getElementById('dbStatus').innerText = "路徑：queue_v5 | 系統正常運作中";
    });

    // 2. 取號功能
    function takeTicket() {
        db.ref('queue_v5/last').transaction((last) => {
            const next = (last || 0) + 1;
            document.getElementById('myTicket').innerText = next;
            return next;
        });
    }

    // 3. 叫下一位 (含 iPad 喚醒機制)
    async function nextCall() {
        if (!isAdmin) return;
        
        // 喚醒語音引擎
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

        const cid = document.getElementById('counterId').value;
        const snapshot = await db.ref('queue_v5').once('value');
        const data = snapshot.val() || { current: 0, last: 0 };

        if (data.current < data.last) {
            const nextNum = data.current + 1;
            await db.ref('queue_v5').update({ current: nextNum, counter: cid });
            
            // 延遲一點點，確保更新完成且引擎準備好
            setTimeout(() => {
                speak(nextNum, cid);
            }, 200);
        } else {
            alert("目前沒有人在排隊喔！");
        }
    }

    // 4. 重播目前叫號 (不改資料庫)
    function replayCall() {
        if (!isAdmin || currentDisplayNum === 0) return;
        speak(currentDisplayNum, currentDisplayCounter);
    }

    // 5. 核心語音功能 (iPad 相容版)
    function speak(n, c) {
        if (!isAdmin) return;
        const synth = window.speechSynthesis;
        synth.cancel(); // 停止目前所有語音

        const text = "請來賓 " + n + " 號，到 " + c + " 號櫃檯辦理";
        const msg = new SpeechSynthesisUtterance(text);
        
        msg.lang = 'zh-TW';
        msg.rate = 0.85;
        msg.volume = 1.0;

        // 搜尋最適合的中文語音
        const voices = synth.getVoices();
        const preferredVoice = voices.find(v => v.lang === 'zh-TW' && v.name.includes('Meijia')) || 
                               voices.find(v => v.lang.includes('zh-TW')) || 
                               voices[0];
        
        if (preferredVoice) msg.voice = preferredVoice;

        synth.speak(msg);
    }

    // 6. 重置功能
    function resetQueue() {
        if(confirm("確定要將所有號碼清零嗎？")) {
            db.ref('queue_v5').set({ current: 0, last: 0, counter: 1 });
            document.getElementById('myTicket').innerText = "--";
        }
    }

    // iPad 語音預載
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>

</body>
</html>
